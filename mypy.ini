[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True

# Strict for core logic modules
[mypy-tradeagent.analysis.*]
strict = True
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-tradeagent.strategy.*]
strict = True
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-tradeagent.portfolio.*]
strict = True
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-tradeagent.backtest.*]
strict = True
disallow_untyped_defs = True
disallow_any_generics = True

# Third-party stubs not available — ignore missing
[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-structlog.*]
ignore_missing_imports = True
